name: Scheduled Fetch - Daily Communication Sync

on:
  schedule:
    # Run daily at 8:00 AM UTC (adjust as needed)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  daily-fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load WhatsApp session
        if: hashFiles('whatsapp_session.json') != ''
        env:
          SESSION_DATA: ${{ secrets.WHATSAPP_SESSION }}
        run: |
          echo "$SESSION_DATA" | base64 -d > whatsapp_session.json

      - name: Fetch communications
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
          DEBUG: false
        run: |
          python -m src.main

      - name: Save results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: daily-results-${{ github.run_number }}
          path: results.json
          retention-days: 7

      - name: Update GitHub Issues with summary
        if: success()
        uses: actions/github-script@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('results.json', 'utf8'));

            const timestamp = new Date(results.timestamp).toLocaleString();
            const body = `## 📊 Daily Communication Summary

            **Date:** ${timestamp}

            ### WhatsApp 📱
            - Total chats: ${results.whatsapp.length}
            - Status: ✓ Synced

            ### Gmail 📧
            - Total threads: ${results.gmail.length}
            - Status: ✓ Synced

            ### Next Steps
            - [ ] Review pending responses
            - [ ] Check action items
            - [ ] Analyze sentiment

            *Auto-generated by Communication Manager*
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Daily Sync - ${timestamp}`,
              body: body,
              labels: ['communication-summary', 'automated']
            });

      - name: Commit session updates
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'auto: Update WhatsApp session'
          file_pattern: 'whatsapp_session.json'
